<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH Automation | السوق</title>
    <style>
        :root {
            --dark-bg: #1a1a1a;
            --main-blue: #0056b3;
            --accent-orange: #e67e22;
            --green-btn: #28a745;
            --red-btn: #dc3545;
            --light-bg: #f4f4f4;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: var(--light-bg); text-align: right; overflow-x: hidden; }

        header {
            background: var(--dark-bg); color: white; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .logo { font-weight: bold; font-size: 1.1rem; color: var(--accent-orange); }

        .engineer-icon {
            font-size: 24px; background: #333; border-radius: 50%;
            width: 38px; height: 38px; display: flex; justify-content: center;
            align-items: center; border: 2px solid var(--accent-orange);
        }

        .user-profile-btn { display: flex; align-items: center; gap: 10px; cursor: pointer; }

        /* القائمة الجانبية */
        .side-menu {
            position: fixed; top: 0; right: -280px; width: 260px; height: 100%;
            background: var(--dark-bg); color: white; transition: 0.3s; z-index: 2000;
            padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        .side-menu.open { right: 0; }
        .side-menu a, .side-menu button {
            display: block; color: white; text-decoration: none; padding: 15px;
            border-bottom: 1px solid #333; font-size: 1rem; width: 100%; text-align: right;
            background: none; border: none; cursor: pointer;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }

        /* شريط السلة */
        .cart-bar {
            background: var(--main-blue); margin: 15px; padding: 15px;
            border-radius: 12px; color: white; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>
<div id="sideMenu" class="side-menu">
    <div style="text-align:center; padding-bottom:20px; border-bottom:1px solid #444;">
        <div style="font-size: 50px;">👷‍♂️</div>
        <h3 id="menu-user-name">المهندس</h3>
    </div>
    <a href="index.html">🏠 الرئيسية</a>
    <a href="market.html">🛒 السوق</a>
    <a href="industrial-solutions.html">🏭 الحلول الصناعية</a>
    <a href="projects.html">🏗️ أعمالنا</a>
    <a href="services.html">⚙️ خدماتنا</a>
    <button onclick="resetUser()" style="color:var(--accent-orange); margin-top:20px;">👤 تغيير الحساب</button>
</div>

<header>
    <div class="logo">DH.Automation</div>
    <div class="user-profile-btn" onclick="toggleMenu()">
        <span id="header-user-name">مهندس...</span>
        <div class="engineer-icon">👷‍♂️</div>
    </div>
</header>

<div class="cart-bar">
    <div style="display:flex; gap:8px;">
        <button style="background:var(--green-btn); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;">إرسال</button>
        <button style="background:var(--red-btn); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;">إفراغ</button>
    </div>
    <div style="font-weight:bold;">🛒 السلة: 0</div>
</div>

<script>
    // جلب الاسم من الصفحة الرئيسية (localStorage)
    window.onload = function() {
        const savedName = localStorage.getItem('engineerName');
        if (savedName) {
            document.getElementById('header-user-name').innerText = "مهندس " + savedName;
            document.getElementById('menu-user-name').innerText = "مهندس " + savedName;
        } else {
            // لو دخل الصفحة دي مباشرة بدون تسجيل يرجعه يسجل اسمه
            window.location.href = "index.html"; 
        }
    };

    function toggleMenu() {
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        menu.classList.toggle('open');
        overlay.style.display = menu.classList.contains('open') ? 'block' : 'none';
    }

    function resetUser() {
        if(confirm("هل تريد تسجيل الخروج وتغيير الاسم؟")) {
            localStorage.removeItem('engineerName');
            window.location.href = "index.html";
        }
    }
</script>

</body>
</html>
