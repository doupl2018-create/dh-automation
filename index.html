<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH Automation - مساعد المهندس</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00a8ff; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 20px; }
        .header { padding: 30px 10px; text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 2px; color: var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: auto; }
        .btn-card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; text-decoration: none; color: white; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .btn-card:active { transform: scale(0.95); background: var(--primary); }
        .btn-card i { font-size: 30px; margin-bottom: 10px; color: var(--primary); }
        .btn-card span { font-size: 14px; font-weight: bold; }
        .footer { margin-top: 40px; font-size: 12px; color: #666; }
        /* نظام البلوك */
        #blocked-screen { display: none; background: #000; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; text-align: center; padding-top: 100px; }
        .lock-icon { font-size: 80px; color: #ff4757; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="blocked-screen">
        <i class="fas fa-user-slash lock-icon"></i>
        <h1>الوصول محظور</h1>
        <p>عفواً يا هندسة، هذا الجهاز غير مصرح له بالدخول.</p>
        <p>تواصل مع الإدارة لفك الحظر.</p>
    </div>

    <div id="main-content">
        <div class="header">
            <h1>DH AUTOMATION</h1>
            <p style="color: #888;">مساعد المهندس - النسخة الاحترافية</p>
        </div>

        <div class="grid">
            <a href="#" class="btn-card">
                <i class="fas fa-book"></i>
                <span>كتالوجات Sunch</span>
            </a>
            <a href="#" class="btn-card">
                <i class="fas fa-microchip"></i>
                <span>أكواد PIC</span>
            </a>
            <a href="#" class="btn-card">
                <i class="fas fa-calculator"></i>
                <span>حسابات هندسية</span>
            </a>
            <a href="https://wa.me/201012345678" class="btn-card" style="border-color: #25d366;">
                <i class="fab fa-whatsapp" style="color: #25d366;"></i>
                <span>الدعم الفني</span>
            </a>
        </div>

        <div class="footer">
            <p>جميع الحقوق محفوظة لـ DH Automation &copy; 2026</p>
        </div>
    </div>

    <script>
        // قائمة البلوك (القائمة السوداء)
        const blacklisted = ["ID_واحد_مشاكس", "TEST_ID"]; 

        const params = new URLSearchParams(window.location.search);
        const deviceId = params.get('id');

        if (blacklisted.includes(deviceId)) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('blocked-screen').style.display = 'block';
        }
    </script>
</body>
</html>
