<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH.Automation | متجر مساعد المهندس</title>
    <style>
        :root {
            --header-bg: #1a1a1a;
            --main-blue: #0056b3;
            --green-btn: #28a745;
            --red-btn: #dc3545;
            --bg-light: #f4f4f4;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
        }

        /* الهيدر الأسود العلوي */
        header {
            background: var(--header-bg);
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-links { display: flex; gap: 15px; }
        .nav-links a { color: white; text-decoration: none; font-size: 14px; cursor: pointer; }

        /* حاوية السلة */
        .cart-container {
            background: var(--main-blue);
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-btns { display: flex; gap: 5px; }
        .btn-sm { border: none; padding: 5px 10px; border-radius: 5px; color: white; cursor: pointer; }

        /* عنوان القسم */
        .category-title {
            background: #007bff;
            color: white;
            margin: 10px 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        /* كارت المنتج */
        .product-card {
            background: white;
            margin: 10px 15px;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .product-info { flex: 1; text-align: right; }
        .product-info h3 { margin: 0 0 5px 0; font-size: 16px; color: #333; }
        .price { color: var(--green-btn); font-weight: bold; margin: 5px 0; }
        .details-tag { background: #17a2b8; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        .product-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; margin-right: 10px; }

        /* أزرار التحكم */
        .controls { display: flex; align-items: center; gap: 5px; margin-top: 10px; }
        .qty-input { width: 30px; text-align: center; border: 1px solid #ccc; }
        .btn-plus-minus { background: #eee; border: 1px solid #ccc; width: 25px; height: 25px; cursor: pointer; }
        .btn-add { background: var(--green-btn); color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }

        /* إخفاء الأقسام */
        .page-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px;">🔍</div>
    <div style="font-weight: bold;">DH.Automation</div>
    <div class="nav-links">
        <a onclick="showPage('market')">المتجر</a>
        <a onclick="showPage('services')">خدماتنا</a>
    </div>
</header>

<div id="market" class="page-content active">
    <div class="cart-container">
        <div class="cart-btns">
            <button class="btn-sm" style="background:var(--green-btn)">إرسال</button>
            <button class="btn-sm" style="background:var(--red-btn)">إفراغ</button>
        </div>
        <div id="cart-total">🛒 السلة: 0 (0 ج.م)</div>
    </div>

    <div class="category-title">كارتات إلكترونية</div>

    <div class="product-card">
        <div>
            <button class="btn-add">أضف</button>
            <div class="controls">
                <button class="btn-plus-minus">-</button>
                <input type="text" class="qty-input" value="1">
                <button class="btn-plus-minus">+</button>
            </div>
        </div>
        <div class="product-info">
            <h3>كارت مساطر سنترتو</h3>
            <span class="details-tag">تفاصيل</span>
            <div class="price">290 ج.م</div>
        </div>
        <img src="https://via.placeholder.com/70" class="product-img" alt="product">
    </div>

    <div class="product-card">
        <div>
            <button class="btn-add">أضف</button>
            <div class="controls">
                <button class="btn-plus-minus">-</button>
                <input type="text" class="qty-input" value="1">
                <button class="btn-plus-minus">+</button>
            </div>
        </div>
        <div class="product-info">
            <h3>كارت خرج عشرة قناة</h3>
            <span class="details-tag">تفاصيل</span>
            <div class="price">1800 ج.م</div>
        </div>
        <img src="https://via.placeholder.com/70" class="product-img" alt="product">
    </div>
</div>

<div id="services" class="page-content">
    <div style="padding: 20px; text-align: center;">
        <h2>خدماتنا الهندسية</h2>
        <p>برمجة PLC - تصميم دوائر - صيانة انفرتر</p>
    </div>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }
</script>

</body>
</html>
