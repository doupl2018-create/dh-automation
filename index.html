<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH Automation</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="icon" href="images/Icon-page.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header id="header-title">سوق مساعد المهندس</header>

    <div class="container">
        <div id="market" class="page active">
            <div class="product-row" data-id="1" data-name="حساس NTC" data-price="150">
                <img src="images/01 (1).jpg" class="product-img">
                <div class="product-info">
                    <h4>حساس حرارة NTC</h4>
                    <p>150 ج.م</p>
                </div>
                <button class="add-btn" onclick="toggleCart(this)">إضافة</button>
            </div>
            </div>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showPage('market', 'السوق', this)">🛒 السوق</div>
        <div class="nav-item" onclick="showPage('projects', 'المشاريع', this)">⚙️ المشاريع</div>
    </nav>

    <script src="script.js"></script>
    <div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>
</body>
</html>
