<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #1a73e8; --bg-color: #f0f2f5; --success-color: #28a745; --danger-color: #dc3545; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; direction: rtl; }
        header { background: var(--primary-color); color: white; padding: 15px; text-align: center; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .container { padding: 75px 15px 230px 15px; } 

        .post-card { background: white; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; }
        .post-avatar { width: 40px; height: 40px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        /* تمرير الصور (الـ Slider اللي طلبته) */
        .post-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; background: #eee; }
        .post-gallery::-webkit-scrollbar { display: none; }
        .post-gallery img { width: 100%; flex-shrink: 0; height: 250px; object-fit: contain; scroll-snap-align: start; cursor: pointer; }
        
        .post-content { padding: 15px; }
        .post-text { font-size: 0.95rem; color: #333; line-height: 1.6; }

        .categories-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .cat-btn { background: white; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-family: 'Cairo'; }
        .cat-btn.active-cat { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .product-row { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-img { width: 60px; height: 60px; border-radius: 8px; margin-left: 15px; }
        
        .floating-cart { position: fixed; bottom: 65px; left: 0; width: 100%; background: white; padding: 10px 15px; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); z-index: 999; display: none; box-sizing: border-box; }
        .whatsapp-btn { width: 100%; background: var(--success-color); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 8px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 0.85rem; color: #666; cursor: pointer; flex: 1; }
        .nav-item.active-nav { color: var(--primary-color); font-weight: bold; }

        .page { display: none; }
        .page.active { display: block; }
        .lightbox { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .lightbox img { max-width: 90%; max-height: 80%; }
    </style>
</head>
<body>

    <header id="header-title">DH Automation</header>

    <div class="container">
        <div id="home" class="page active">
            <div style="display: grid; gap: 15px;">
                <div class="post-card" onclick="showPage('market', 'سوق مساعد المهندس', document.getElementById('nav-market'))" style="padding:20px; text-align:center; cursor:pointer;"><h3>🛒 سوق مساعد المهندس</h3></div>
                <div class="post-card" onclick="showPage('solutions', 'الحلول الصناعية')" style="padding:20px; text-align:center; cursor:pointer;"><h3>🏭 الحلول الصناعية</h3></div>
                <div class="post-card" onclick="showPage('automation', 'التحكم الآلي')" style="padding:20px; text-align:center; cursor:pointer;"><h3>🤖 التحكم الآلي</h3></div>
                <div class="post-card" onclick="showPage('projects', 'مشاريعنا', document.getElementById('nav-projects'))" style="padding:20px; text-align:center; cursor:pointer;"><h3>⚙️ مشاريعنا</h3></div>
            </div>
        </div>

        <div id="market" class="page">
            <div class="categories-bar">
                <button class="cat-btn active-cat" onclick="filterMarket('الكل', this)">الكل</button>
                <button class="cat-btn" onclick="filterMarket('كارتات إلكترونية', this)">كارتات</button>
            </div>
            <div id="market-products"></div>
        </div>

        <div id="solutions" class="page"></div>
        <div id="automation" class="page"></div>
        <div id="projects" class="page"></div>
    </div>

    <div id="cart-bar" class="floating-cart">
        <span>الإجمالي: <b id="total-price">0</b> ج.م</span>
        <button class="whatsapp-btn" onclick="checkoutWhatsApp()">واتساب ✅</button>
    </div>

    <nav>
        <div id="nav-home" class="nav-item active-nav" onclick="showPage('home', 'DH Automation', this)">🏠<br>الرئيسية</div>
        <div id="nav-market" class="nav-item" onclick="showPage('market', 'السوق', this)">🛒<br>السوق</div>
        <div id="nav-projects" class="nav-item" onclick="showPage('projects', 'المشاريع', this)">⚙️<br>المشاريع</div>
    </nav>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightbox-img"></div>

    <script>
        const products = [
            { id: '1', cat: 'أجهزة', name: 'حساس حرارة NTC', price: 150, img: 'images/01 (1).jpg' },
            { id: '2', cat: 'كارتات إلكترونية', name: 'كارت LVDT', price: 1200, img: 'images/01 (2).jpg' }
        ];

        const postsData = {
            solutions: [{ title: 'الحلول الصناعية', text: 'تطوير خطوط الإنتاج.', images: ['images/01 (1).jpg', 'images/01 (2).jpg', 'images/01 (3).jpg'] }],
            projects: [{ title: 'مشاريعنا', text: 'تحديث ماكينات البلاستيك.', images: ['images/01 (3).jpg', 'images/01 (4).jpg', 'images/01 (1).jpg'] }]
        };

        let cart = [];

        // نظام زرار الرجوع
        function showPage(pageId, title, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('header-title').innerText = title;
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active-nav'));
            if(element) element.classList.add('active-nav');
            
            if(['solutions', 'automation', 'projects'].includes(pageId)) renderPosts(pageId);
            document.getElementById('cart-bar').style.display = (pageId === 'market') ? 'block' : 'none';

            // تسجيل الصفحة في تاريخ الموبايل عشان لما يدوس "رجوع" يرجع للرئيسية
            if (pageId !== 'home') {
                window.history.pushState({ page: pageId, title: title }, title);
            }
        }

        // مراقبة زرار الرجوع بتاع الموبايل
        window.onpopstate = function(event) {
            if (event.state && event.state.page) {
                showPage(event.state.page, event.state.title, null);
            } else {
                showPage('home', 'DH Automation', document.getElementById('nav-home'));
            }
        };

        function renderPosts(pageId) {
            const container = document.getElementById(pageId);
            const posts = postsData[pageId] || [];
            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-header"><strong>${post.title}</strong></div>
                    <div class="post-gallery">
                        ${post.images.map(img => `<img src="${img}" onclick="openLightbox('${img}')">`).join('')}
                    </div>
                    <div class="post-content"><p>${post.text}</p></div>
                </div>`).join('');
        }

        function renderMarket() {
            const container = document.getElementById('market-products');
            container.innerHTML = products.map(p => `
                <div class="product-row">
                    <img src="${p.img}" class="product-img">
                    <div style="flex:1"><h4>${p.name}</h4><b>${p.price} ج.م</b></div>
                    <button onclick="addToCart('${p.id}')" style="background:var(--success-color); color:white; border:none; padding:8px; border-radius:5px;">إضافة</button>
                </div>`).join('');
        }

        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
        function addToCart(id) { /* كود الكارت البسيط بتاعك */ alert('تمت الإضافة'); }
        function checkoutWhatsApp() { window.open('https://wa.me/201227091465?text=طلب جديد'); }

        window.onload = () => {
            renderMarket();
            // وضع الحالة الابتدائية
            window.history.replaceState({ page: 'home', title: 'DH Automation' }, 'DH Automation');
        };
    </script>
</body>
</html>
