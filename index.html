<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH Automation - مساعد المهندس</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { background: #2d2d2d; border-radius: 15px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-top: 50px; }
        h1 { color: #0078d4; }
        .btn { background: #0078d4; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; }
        #blocked-screen { display: none; background: #900; padding: 50px; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
    </style>
</head>
<body>

    <div id="blocked-screen">
        <h1>عفواً.. الوصول ممنوع</h1>
        <p>تم حظر هذا الجهاز من قبل إدارة DH Automation.</p>
    </div>

    <div id="main-content" class="container">
        <h1>DH Automation</h1>
        <p>أهلاً بك يا هندسة في تطبيق "مساعد المهندس"</p>
        <p>هنا هتلاقي كل الكتالوجات والأدوات البرمجية اللي بتحتاجها.</p>
        <a href="https://wa.me/201012345678" class="btn">طلب دعم فني (واتساب)</a>
    </div>

    <script>
        // دي القائمة السوداء (Blacklist) - حط فيها الـ IDs اللي عايز تحظرها
        const blacklistedDevices = ["ID_واحد_مشاكس", "TEST_ID"];

        // بنجيب الـ ID من الرابط اللي التطبيق بيبعته
        const params = new URLSearchParams(window.location.search);
        const deviceId = params.get('id');

        if (blacklistedDevices.includes(deviceId)) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('blocked-screen').style.display = 'block';
        }
    </script>
</body>
</html>
