<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH Automation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/Icon-page.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header id="header-title">سوق مساعد المهندس</header>

    <div class="container">
        <div id="market" class="page active">
            
            <div class="product-row" data-id="1" data-name="حساس NTC" data-price="150">
                <img src="images/01 (1).jpg" class="product-img">
                <div class="product-info">
                    <h4>حساس حرارة NTC</h4>
                    <p>150 ج.م</p>
                </div>
                <div class="controls">
                    <div class="qty-control">
                        <button onclick="changeQty(this, 1)">+</button>
                        <span class="qty-val">1</span>
                        <button onclick="changeQty(this, -1)">-</button>
                    </div>
                    <button class="details-btn" onclick="showDetails('1')">تفاصيل</button>
                    <button class="add-btn" onclick="toggleCart(this)">إضافة</button>
                </div>
            </div>

            <div class="product-row" data-id="2" data-name="كارت LVDT" data-price="1200">
                <img src="images/01 (2).jpg" class="product-img">
                <div class="product-info">
                    <h4>كارت تحكم LVDT</h4>
                    <p>1200 ج.م</p>
                </div>
                <div class="controls">
                    <div class="qty-control">
                        <button onclick="changeQty(this, 1)">+</button>
                        <span class="qty-val">1</span>
                        <button onclick="changeQty(this, -1)">-</button>
                    </div>
                    <button class="details-btn" onclick="showDetails('2')">تفاصيل</button>
                    <button class="add-btn" onclick="toggleCart(this)">إضافة</button>
                </div>
            </div>

        </div>

        <div id="projects" class="page">
            <div class="card">
                <h2>تطوير تقنيات الحقن</h2>
                <p>محتوى مشاريعك الهندسية هيظهر هنا يا هندسة.</p>
            </div>
        </div>
    </div>

    <div class="floating-cart">
        <div class="cart-info">
            <span>الإجمالي: <b id="total-price">0</b> ج.م</span>
            <span class="clear-cart" onclick="clearCart()">تفريغ 🗑️</span>
        </div>
        <button class="whatsapp-btn" onclick="checkoutWhatsApp()">
            إتمام الشراء (واتساب) ✅
        </button>
    </div>

    <nav>
        <div class="nav-item active-nav" onclick="showPage('market', 'السوق', this)">🛒<br>السوق</div>
        <div class="nav-item" onclick="showPage('projects', 'المشاريع', this)">⚙️<br>المشاريع</div>
    </nav>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
