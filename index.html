<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #1a73e8; --bg-color: #f0f2f5; --success-color: #28a745; --danger-color: #dc3545; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; direction: rtl; }
        header { background: var(--primary-color); color: white; padding: 15px; text-align: center; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .container { padding: 75px 15px 230px 15px; } 

        /* نظام المنشورات (مثل فيسبوك) */
        .post-card { background: white; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .post-avatar { width: 40px; height: 40px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        .post-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 2px; background: #ddd; cursor: pointer; }
        .post-gallery img { width: 100%; height: 200px; object-fit: cover; }
        
        .post-content { padding: 15px; }
        .post-text { font-size: 0.95rem; color: #333; line-height: 1.6; }
        .more-text { display: none; }
        .read-more-btn { color: var(--primary-color); cursor: pointer; font-weight: bold; display: block; margin-top: 5px; }

        /* تنسيق السوق والتصنيفات (بدون تغيير) */
        .categories-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; }
        .cat-btn { background: white; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; white-space: nowrap; font-family: 'Cairo'; }
        .cat-btn.active-cat { background: var(--primary-color); color: white; }
        .product-row { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .product-img { width: 60px; height: 60px; border-radius: 8px; margin-left: 15px; }
        
        /* شريط السعر والمنيو */
        .floating-cart { position: fixed; bottom: 65px; left: 0; width: 100%; background: white; padding: 10px 15px; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); z-index: 999; display: none; }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 8px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 0.85rem; color: #666; cursor: pointer; flex: 1; }
        .nav-item.active-nav { color: var(--primary-color); font-weight: bold; }

        /* نافذة عرض الصور الكبيرة (Lightbox) */
        .lightbox { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .lightbox img { max-width: 95%; max-height: 80%; border-radius: 5px; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 35px; cursor: pointer; }
        
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <header id="header-title">DH Automation</header>

    <div class="container">
        <div id="home" class="page active">
            <div style="display: grid; gap: 15px;">
                <div class="post-card" onclick="showPage('market', 'سوق مساعد المهندس', document.getElementById('nav-market'))" style="padding:20px; text-align:center; cursor:pointer;"><h3>🛒 سوق مساعد المهندس</h3></div>
                <div class="post-card" onclick="showPage('solutions', 'الحلول الصناعية')" style="padding:20px; text-align:center; cursor:pointer;"><h3>🏭 الحلول الصناعية</h3></div>
                <div class="post-card" onclick="showPage('automation', 'التحكم الآلي')" style="padding:20px; text-align:center; cursor:pointer;"><h3>🤖 التحكم الآلي</h3></div>
                <div class="post-card" onclick="showPage('projects', 'مشاريعنا')" style="padding:20px; text-align:center; cursor:pointer;"><h3>⚙️ مشاريعنا</h3></div>
            </div>
        </div>

        <div id="market" class="page">
            <div class="categories-bar">
                <button class="cat-btn active-cat" onclick="filterMarket('الكل', this)">الكل</button>
                <button class="cat-btn" onclick="filterMarket('كارتات إلكترونية', this)">كارتات إلكترونية</button>
                <button class="cat-btn" onclick="filterMarket('كلاسيك كنترول', this)">كلاسيك كنترول</button>
                <button class="cat-btn" onclick="filterMarket('أجهزة', this)">أجهزة</button>
            </div>
            <div id="market-products"></div>
        </div>

        <div id="solutions" class="page"></div>
        <div id="automation" class="page"></div>
        <div id="projects" class="page"></div>
    </div>

    <div id="cart-bar" class="floating-cart">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
            <span>الإجمالي: <b id="total-price">0</b> ج.م</span>
            <span onclick="clearCart()" style="cursor:pointer; color:var(--danger-color)">تفريغ 🗑️</span>
        </div>
        <button style="width:100%; background:var(--success-color); color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; font-family:'Cairo';" onclick="checkoutWhatsApp()">إتمام الشراء ✅</button>
    </div>

    <nav>
        <div id="nav-home" class="nav-item active-nav" onclick="showPage('home', 'DH Automation', this)">🏠<br>الرئيسية</div>
        <div id="nav-market" class="nav-item" onclick="showPage('market', 'السوق', this)">🛒<br>السوق</div>
        <div id="nav-projects" class="nav-item" onclick="showPage('projects', 'المشاريع', this)">⚙️<br>المشاريع</div>
    </nav>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
        // داتا المنشورات للتجربة
        const postsData = {
            solutions: [
                { title: 'حلول ماكينات الحقن', text: 'بنقدملك حلول متكاملة لتطوير دوائر التحكم في ماكينات الحقن، وتوفير كارتات الـ LVDT وحساسات الـ NTC لضمان أعلى دقة في المشوار والحرارة. النظام بتاعنا بيخلي الماكينة تشتغل بسلاسة أكتر وبأقل أعطال ممكنة.', images: ['images/01 (1).jpg', 'images/01 (2).jpg', 'images/01 (3).jpg'] }
            ],
            automation: [
                { title: 'أنظمة التحكم الآلي PLC', text: 'برمجة وتصميم لوحات تحكم كاملة باستخدام PLC و HMI. لو عايز تحول مصنعك لنظام أتوماتيك بالكامل، إحنا معاك من أول التصميم لحد التشغيل والمعايرة.', images: ['images/01 (4).jpg', 'images/01 (2).jpg', 'images/01 (1).jpg'] }
            ],
            projects: [
                { title: 'مشروع تطوير لوحة كسر', text: 'تم بفضل الله الانتهاء من تحديث نظام التحكم لكسارة بلاستيك كبرى، وإضافة أنظمة حماية للمواتير وتحسين استهلاك الطاقة بنسبة 20%.', images: ['images/01 (3).jpg', 'images/01 (4).jpg', 'images/01 (2).jpg'] }
            ]
        };

        const products = [
            { id: '1', cat: 'أجهزة', name: 'حساس حرارة NTC', price: 150, img: 'images/01 (1).jpg' },
            { id: '2', cat: 'كارتات إلكترونية', name: 'كارت LVDT', price: 1200, img: 'images/01 (2).jpg' }
        ];

        let cart = JSON.parse(localStorage.getItem('dh_cart')) || [];

        function renderPosts(pageId) {
            const container = document.getElementById(pageId);
            const posts = postsData[pageId] || [];
            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-avatar">DH</div>
                        <div style="font-weight:bold;">${post.title}</div>
                    </div>
                    <div class="post-gallery">
                        ${post.images.map(img => `<img src="${img}" onclick="openLightbox('${img}', event)">`).join('')}
                    </div>
                    <div class="post-content">
                        <div class="post-text">
                            ${post.text.substring(0, 80)}<span class="more-text" id="more-${post.title}">${post.text.substring(80)}</span>
                            <span class="read-more-btn" onclick="toggleReadMore(this, 'more-${post.title}')">... المزيد</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleReadMore(btn, moreId) {
            const moreText = document.getElementById(moreId);
            if (moreText.style.display === "inline") {
                moreText.style.display = "none";
                btn.innerText = "... المزيد";
            } else {
                moreText.style.display = "inline";
                btn.innerText = " عرض أقل";
            }
        }

        function openLightbox(src, event) {
            event.stopPropagation();
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function showPage(pageId, title, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('header-title').innerText = title;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active-nav'));
            if(element) element.classList.add('active-nav');
            
            if(['solutions', 'automation', 'projects'].includes(pageId)) renderPosts(pageId);
            document.getElementById('cart-bar').style.display = (pageId === 'market') ? 'block' : 'none';
        }

        // وظائف السوق (نفس الكود السابق)
        function renderMarket(filter = 'الكل') {
            const container = document.getElementById('market-products');
            const filtered = filter === 'الكل' ? products : products.filter(p => p.cat === filter);
            container.innerHTML = filtered.map(p => {
                const item = cart.find(i => i.id === p.id);
                return `
                <div class="product-row" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">
                    <div style="display:flex; align-items:center;"><img src="${p.img}" class="product-img"><div class="product-info"><h4>${p.name}</h4><p>${p.price} ج.م</p></div></div>
                    <button class="add-btn" style="background: ${item ? 'var(--danger-color)' : 'var(--success-color)'}; color:white; border:none; padding:8px 15px; border-radius:6px; font-family:'Cairo';" onclick="toggleCart(this)">${item ? 'إلغاء' : 'إضافة'}</button>
                </div>`;
            }).join('');
            updateTotal();
        }

        function filterMarket(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            renderMarket(cat);
        }

        function toggleCart(btn) {
            let row = btn.closest('.product-row');
            let id = row.getAttribute('data-id');
            if (btn.innerText === "إضافة") {
                cart.push({ id, name: row.getAttribute('data-name'), price: parseInt(row.getAttribute('data-price')), qty: 1 });
                btn.innerText = "إلغاء"; btn.style.background = "var(--danger-color)";
            } else {
                cart = cart.filter(i => i.id !== id);
                btn.innerText = "إضافة"; btn.style.background = "var(--success-color)";
            }
            localStorage.setItem('dh_cart', JSON.stringify(cart));
            updateTotal();
        }

        function updateTotal() { document.getElementById('total-price').innerText = cart.reduce((s, i) => s + (i.price * i.qty), 0); }
        function clearCart() { cart = []; localStorage.removeItem('dh_cart'); renderMarket(); }

        renderMarket();
    </script>
</body>
</html>
