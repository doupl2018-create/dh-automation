<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DH Automation Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1877f2;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #050505;
            --sub-text: #65676b;
            --border: #dddfe2;
        }

        body {
            margin: 0; background: var(--bg); font-family: 'Cairo', sans-serif;
            color: var(--text); padding-bottom: 70px;
        }

        /* الهيدر */
        .header {
            background: var(--card); padding: 10px 16px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        /* تصميم المنشور الاحترافي */
        .post {
            background: var(--card);
            margin: 12px auto;
            max-width: 500px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .post-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #e4e6eb;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .post-info b { font-size: 15px; color: var(--text); }
        .post-info small { color: var(--sub-text); display: block; font-size: 12px; }

        .post-content {
            padding: 4px 16px 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* معرض الصور (Slider) */
        .post-gallery {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 4px;
            padding: 0 4px;
            scrollbar-width: none; /* لإخفاء السكرول في فيرفوكس */
        }
        .post-gallery::-webkit-scrollbar { display: none; } /* لإخفاء السكرول في كروم */

        .post-gallery img {
            width: 92%;
            flex-shrink: 0;
            height: 300px;
            object-fit: cover;
            border-radius: 4px;
            scroll-snap-align: center;
        }

        /* أزرار التفاعل */
        .post-actions {
            display: flex;
            padding: 4px 16px;
            border-top: 1px solid #f0f2f5;
            margin-top: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--sub-text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 4px;
        }

        .action-btn:active { background: #f2f2f2; }
        .action-btn.liked { color: var(--primary); }

        /* الشريط السفلي */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            display: flex; border-top: 1px solid var(--border); padding: 8px 0;
        }
        .nav-item { flex: 1; text-align: center; color: var(--sub-text); font-size: 11px; }
        .nav-item.active { color: var(--primary); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900; color: var(--primary); font-size: 18px;">DH Automation</div>
        <div style="color: var(--sub-text);"><i class="fas fa-search"></i></div>
    </div>

    <div class="post">
        <div class="post-header">
            <div class="avatar">
                <img src="images/Icon-page.jpg" style="width:100%; border-radius:50%;">
            </div>
            <div class="post-info">
                <b>DH Automation</b>
                <small>منذ ساعة • <i class="fas fa-globe-americas"></i></small>
            </div>
        </div>

        <div class="post-content">
            مهندسينا الكرام، متاح الآن أحدث إصدارات كارتات التحكم والحلول الصناعية المتكاملة. جودة عالية وضمان حقيقي. 
            <br><br>
            📌 اسحب الصور لمشاهدة التفاصيل.
        </div>

        <div class="post-gallery">
            <img src="images/01 (3).jpg">
            <img src="images/01 (4).jpg">
            <img src="images/01 (5).jpg">
        </div>

        <div class="post-actions">
            <div class="action-btn" id="likeBtn" onclick="toggleLike()">
                <i class="far fa-thumbs-up"></i> إعجاب
            </div>
            <div class="action-btn" onclick="window.location.href='https://wa.me/201000000000'">
                <i class="fab fa-whatsapp"></i> استفسار
            </div>
            <div class="action-btn" onclick="alert('تم نسخ الرابط لمشاركته')">
                <i class="far fa-share-square"></i> مشاركة
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home fa-lg"></i><br>الرئيسية</div>
        <div class="nav-item" onclick="alert('صفحة المتجر')"><i class="fas fa-store fa-lg"></i><br>المتجر</div>
        <div class="nav-item"><i class="fas fa-briefcase fa-lg"></i><br>مشاريعنا</div>
    </div>

    <script>
        function toggleLike() {
            const btn = document.getElementById('likeBtn');
            btn.classList.toggle('liked');
            const icon = btn.querySelector('i');
            if(btn.classList.contains('liked')) {
                icon.className = 'fas fa-thumbs-up';
                btn.style.color = '#1877f2';
            } else {
                icon.className = 'far fa-thumbs-up';
                btn.style.color = '#65676b';
            }
        }
    </script>
</body>
</html>
