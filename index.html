    // دالة عرض المشاريع في صفحة "مشاريعنا"
    function renderProjects() {
        const container = document.getElementById('projects');
        container.innerHTML = `<h2 style="text-align:center; padding:20px;">معرض أعمالنا ⚙️</h2>` + projectsData.map(p => `

                <div style="padding:15px;">
                    <h3 style="margin-top:0;">${p.title}</h3>

            </div>
        `).join('');

    // دالة عرض الحلول الصناعية
    function renderSolutions() {
        const container = document.getElementById('solutions');
        container.innerHTML = `
            <div style="padding:20px; text-align:center;">
                <h2>الحلول الصناعية 🛠️</h2>

    // دالة المودال الخاصة بالمنشورات (لمزيد من الكلام)
    function showPostDetails(title, img, text) {
        document.getElementById('modalBody').innerHTML = `
            <img src="${img}" style="width:100%; border-radius:12px; margin-bottom:15px;">
            <h2 style="color:var(--primary-color)">${title}</h2>

                ${text} ${text} ${text} </div>
            <button class="whatsapp-btn" style="margin-top:20px;" onclick="closeModal()">إغلاق</button>
        `;
        document.getElementById('detailsModal').style.display = "block";
    }

    // تحديث دالة showPage لتشغيل الرندر عند فتح الصفحة
    function showPage(pageId, title, navId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('header-title').innerText = title;
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active-nav'));
        document.getElementById(navId).classList.add('active-nav');
        
        // إخفاء/إظهار السلة
        document.getElementById('cart-bar').style.display = (pageId === 'market' && cart.length > 0) ? 'block' : 'none';

        // تشغيل الرندر الخاص بكل صفحة
        if(pageId === 'projects') renderProjects();
        if(pageId === 'solutions') renderSolutions();
    }

    // تشغيل أولي للسوق
