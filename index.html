<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>DH Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #1a73e8; --bg-color: #f0f2f5; --success-color: #28a745; --danger-color: #dc3545; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; direction: rtl; overflow-x: hidden; }
        header { background: var(--primary-color); color: white; padding: 15px; text-align: center; font-weight: bold; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .container { padding: 75px 15px 230px 15px; } 

        /* --- نظام المنشورات مع سحب الصور --- */
        .post-card { background: white; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; }
        .post-avatar { width: 40px; height: 40px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        /* خاصية تمرير الصور (Slider) */
        .post-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; background: #eee; gap: 2px; }
        .post-gallery::-webkit-scrollbar { display: none; }
        .post-gallery img { width: 100%; flex-shrink: 0; height: 280px; object-fit: contain; scroll-snap-align: start; cursor: pointer; background: #fff; }
        
        .post-content { padding: 15px; }
        .post-text { font-size: 0.95rem; color: #333; line-height: 1.6; margin: 0; }
        .more-text { display: none; }
        .read-more-btn { color: var(--primary-color); cursor: pointer; font-weight: bold; }

        /* --- تنسيق السوق --- */
        .categories-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .cat-btn { background: white; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-family: 'Cairo'; font-size: 0.85rem; }
        .cat-btn.active-cat { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .product-row { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        .product-img { width: 60px; height: 60px; border-radius: 8px; margin-left: 15px; border: 1px solid #eee; }
        .product-info { flex: 1; }
        .product-info h4 { margin: 0; font-size: 0.9rem; }
        .product-info p { margin: 5px 0 0; color: var(--primary-color); font-weight: bold; }
        .controls { display: flex; gap: 8px; align-items: center; margin-top: 5px; }
        .qty-control { display: flex; align-items: center; gap: 5px; background: #f8f9fa; border-radius: 6px; padding: 4px 8px; border: 1px solid #ddd; }
        .qty-control button { border: none; background: none; font-weight: bold; cursor: pointer; color: var(--primary-color); }
        .add-btn { background: var(--success-color); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-family: 'Cairo'; }
        .details-btn { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-family: 'Cairo'; }

        /* --- القوائم الثابتة --- */
        .floating-cart { position: fixed; bottom: 65px; left: 0; width: 100%; background: white; padding: 10px 15px; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); z-index: 999; box-sizing: border-box; display: none; }
        .whatsapp-btn { width: 100%; background: var(--success-color); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 8px 0; z-index: 1000; }
        .nav-item { text-align: center; font-size: 0.85rem; color: #666; cursor: pointer; flex: 1; }
        .nav-item.active-nav { color: var(--primary-color); font-weight: bold; }

        .page { display: none; }
        .page.active { display: block; }
        
        /* Modal & Lightbox */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 40px auto; padding: 25px; border-radius: 20px; width: 85%; max-width: 450px; text-align: center; position: relative; }
        .lightbox { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .lightbox img { max-width: 95%; max-height: 80%; border-radius: 8px; }
    </style>
</head>
<body>

    <header id="header-title">DH Automation</header>

    <div class="container">
        <div id="home" class="page active">
            <div style="display: grid; gap: 15px;">
                <div class="post-card" onclick="showPage('market', 'سوق مساعد المهندس', true)" style="padding:20px; text-align:center; cursor:pointer;"><h3>🛒 سوق مساعد المهندس</h3></div>
                <div id="dynamic-posts"></div>
            </div>
        </div>

        <div id="market" class="page">
            <div class="categories-bar">
                <button class="cat-btn active-cat" onclick="filterMarket('الكل', this)">الكل</button>
                <button class="cat-btn" onclick="filterMarket('أجهزة', this)">أجهزة</button>
                <button class="cat-btn" onclick="filterMarket('كارتات إلكترونية', this)">كارتات</button>
            </div>
            <div id="market-products"></div>
        </div>

        <div id="solutions" class="page"></div>
        <div id="automation" class="page"></div>
        <div id="projects" class="page"></div>
    </div>

    <div id="cart-bar" class="floating-cart">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
            <span>الإجمالي: <b id="total-price">0</b> ج.م</span>
            <span onclick="clearCart()" style="cursor:pointer; color:var(--danger-color)">تفريغ 🗑️</span>
        </div>
        <button class="whatsapp-btn" onclick="checkoutWhatsApp()">إتمام الشراء (واتساب) ✅</button>
    </div>

    <nav>
        <div id="nav-home" class="nav-item active-nav" onclick="showPage('home', 'DH Automation', true)">🏠<br>الرئيسية</div>
        <div id="nav-market" class="nav-item" onclick="showPage('market', 'السوق', true)">🛒<br>السوق</div>
        <div id="nav-projects" class="nav-item" onclick="showPage('projects', 'المشاريع', true)">⚙️<br>المشاريع</div>
    </nav>

    <div id="detailsModal" class="modal" onclick="closeModalOnEmpty(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span style="position:absolute; left:15px; top:10px; font-size:30px; cursor:pointer; color:#aaa;" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    <div id="lightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightbox-img"></div>

    <script>
        // دايماً غير الرقم ده لما تعدل أي حاجة أوفلاين عشان الموبايل يسحب الجديد
        const APP_VERSION = "1.6"; 

        const products = [
            { id: '1', cat: 'أجهزة', name: 'حساس حرارة NTC', price: 150, img: 'images/01 (1).jpg', desc: 'حساس دقيق لماكينات الحقن.' },
            { id: '2', cat: 'كارتات إلكترونية', name: 'كارت LVDT', price: 1200, img: 'images/01 (2).jpg', desc: 'كارت معايرة مشوار البلاطة.' }
        ];

        const postsData = {
            home: [
                { title: 'جديد كارتات الـ LVDT', text: 'وصل حديثاً كارتات المعايرة الذكية. اسحب الصور لرؤية التفاصيل يمين وشمال.', images: ['images/01 (1).jpg', 'images/01 (2).jpg', 'images/01 (3).jpg'] },
                { title: 'خدمات البرمجة', text: 'برمجة احترافية لجميع أنواع الإنفيرترات والـ PLC.', images: ['images/01 (4).jpg', 'images/01 (1).jpg'] }
            ],
            projects: [{ title: 'مشروع بلاستيك هيروز', text: 'تحديث كامل للوحة التحكم بنظام كلاسيك كنترول متطور.', images: ['images/01 (3).jpg', 'images/01 (4).jpg'] }]
        };

        let cart = JSON.parse(localStorage.getItem('dh_cart')) || [];

        // 1. نظام التحديث الذكي (Cache Buster)
        function smartRefresh() {
            if (localStorage.getItem('app_v') !== APP_VERSION) {
                localStorage.setItem('app_v', APP_VERSION);
                // إضافة timestamp لإجبار المتصفح على التحميل من السيرفر
                const cleanUrl = window.location.href.split('?')[0];
                window.location.href = cleanUrl + '?update=' + Date.now();
            }
        }

        // 2. نظام زرار الرجوع (Back Button)
        function showPage(pageId, title, addHistory = true) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('header-title').innerText = title;
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            const activeNav = document.getElementById('nav-' + (pageId === 'home' || pageId === 'market' || pageId === 'projects' ? pageId : 'home'));
            if(activeNav) activeNav.classList.add('active-nav');

            if(pageId === 'market') renderMarket();
            if(postsData[pageId] || pageId === 'home') renderPosts(pageId === 'home' ? 'dynamic-posts' : pageId, pageId === 'home' ? 'home' : pageId);
            
            document.getElementById('cart-bar').style.display = (pageId === 'market') ? 'block' : 'none';

            if (addHistory && pageId !== 'home') {
                window.history.pushState({ page: pageId, title: title }, title);
            }
        }

        // مراقبة زرار الرجوع في الموبايل
        window.onpopstate = function(event) {
            if (event.state && event.state.page) {
                showPage(event.state.page, event.state.title, false);
            } else {
                showPage('home', 'DH Automation', false);
            }
        };

        // 3. نظام المنشورات مع السلايدر
        function renderPosts(containerId, dataKey) {
            const container = document.getElementById(containerId);
            const posts = postsData[dataKey] || [];
            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-header"><div class="post-avatar">DH</div><strong>${post.title}</strong></div>
                    <div class="post-gallery">
                        ${post.images.map(img => `<img src="${img}" onclick="openLightbox('${img}')">`).join('')}
                    </div>
                    <div class="post-content">
                        <p class="post-text">${post.text}</p>
                    </div>
                </div>`).join('');
        }

        // وظائف السوق والكارت
        function renderMarket(filter = 'الكل') {
            const container = document.getElementById('market-products');
            const filtered = filter === 'الكل' ? products : products.filter(p => p.cat === filter);
            container.innerHTML = filtered.map(p => {
                const cartItem = cart.find(i => i.id === p.id);
                return `
                <div class="product-row" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">
                    <div style="display:flex; align-items:center;"><img src="${p.img}" class="product-img"><div class="product-info"><h4>${p.name}</h4><p>${p.price} ج.م</p></div></div>
                    <div class="controls">
                        <div class="qty-control"><button onclick="changeQty(this, 1)">+</button><span class="qty-val">${cartItem ? cartItem.qty : 1}</span><button onclick="changeQty(this, -1)">-</button></div>
                        <button class="details-btn" onclick="showDetails('${p.id}')">تفاصيل</button>
                        <button class="add-btn" style="background: ${cartItem ? 'var(--danger-color)' : 'var(--success-color)'}" onclick="toggleCart(this)">${cartItem ? 'إلغاء' : 'إضافة'}</button>
                    </div>
                </div>`;
            }).join('');
            updateTotal();
        }

        function toggleCart(btn) {
            let row = btn.closest('.product-row');
            let id = row.getAttribute('data-id');
            if (btn.innerText === "إضافة") {
                cart.push({ id, name: row.getAttribute('data-name'), price: parseInt(row.getAttribute('data-price')), qty: parseInt(row.querySelector('.qty-val').innerText) });
                btn.innerText = "إلغاء"; btn.style.background = "var(--danger-color)";
            } else {
                cart = cart.filter(i => i.id !== id);
                btn.innerText = "إضافة"; btn.style.background = "var(--success-color)";
            }
            localStorage.setItem('dh_cart', JSON.stringify(cart));
            updateTotal();
        }

        function changeQty(btn, delta) {
            let row = btn.closest('.product-row');
            let qtySpan = row.querySelector('.qty-val');
            let currentQty = parseInt(qtySpan.innerText);
            if (currentQty + delta >= 1) {
                qtySpan.innerText = currentQty + delta;
                let item = cart.find(i => i.id === row.getAttribute('data-id'));
                if (item) { item.qty = currentQty + delta; localStorage.setItem('dh_cart', JSON.stringify(cart)); updateTotal(); }
            }
        }

        function updateTotal() { document.getElementById('total-price').innerText = cart.reduce((s, i) => s + (i.price * i.qty), 0); }
        function clearCart() { cart = []; localStorage.removeItem('dh_cart'); renderMarket(); }
        function filterMarket(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            renderMarket(cat);
        }
        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
        function showDetails(id) {
            const p = products.find(item => item.id === id);
            document.getElementById('modalBody').innerHTML = `<img src="${p.img}" style="width:100%; border-radius:12px;"><h3>${p.name}</h3><p>${p.desc}</p>`;
            document.getElementById('detailsModal').style.display = "block";
        }
        function closeModal() { document.getElementById('detailsModal').style.display = "none"; }
        function closeModalOnEmpty(event) { if (event.target.id === "detailsModal") closeModal(); }
        function checkoutWhatsApp() {
            let msg = "*طلب جديد من DH Automation*%0A%0A" + cart.map(i => `• ${i.name} (${i.qty})`).join("%0A");
            window.open(`https://wa.me/201227091465?text=${msg}%0A%0A*الإجمالي: ${document.getElementById('total-price').innerText} ج.م*`, '_blank');
        }

        window.onload = () => {
            smartRefresh();
            renderPosts('dynamic-posts', 'home');
            window.history.replaceState({ page: 'home', title: 'DH Automation' }, 'DH Automation');
        };
    </script>
</body>
</html>
