<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DH Automation App</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --accent: #0084ff;
            --danger: #fa3e3e;
            --nav-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #18191a;
                --card-bg: #242526;
                --text-main: #e4e6eb;
                --accent: #2e89ff;
                --nav-bg: #242526;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding-bottom: 70px;
        }

        /* الهيدر العلوي */
        .header {
            background: var(--nav-bg);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .cart-status {
            position: relative;
            cursor: pointer;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
        }

        /* شبكة الأقسام الرئيسية */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
        }

        .nav-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .nav-card i {
            font-size: 28px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        /* شكل المنتجات في المتجر */
        .product-list { padding: 15px; }
        .product-card {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .product-img { width: 100%; height: 200px; object-fit: cover; }
        .product-info { padding: 15px; }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .qty-btn {
            background: var(--bg-color);
            border: none;
            color: var(--text-main);
            width: 30px; height: 30px;
            border-radius: 5px;
            font-weight: bold;
        }

        .add-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-weight: bold;
        }

        .add-btn.added { background: var(--danger); }

        /* شكل المنشورات (مثل فيسبوك) */
        .post-card {
            background: var(--card-bg);
            margin-bottom: 12px;
            padding: 15px;
        }

        .post-header { display: flex; align-items: center; margin-bottom: 10px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; background: #ccc; margin-left: 10px; }
        
        /* التذييل السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0; width: 100%;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h3 style="margin:0;">DH Automation</h3>
        <div class="cart-status" onclick="showPage('shop')">
            <i class="fas fa-shopping-basket fa-lg"></i>
            <span class="cart-count" id="cartCount">0</span>
            <button onclick="clearCart(event)" style="font-size: 10px; margin-right: 10px;">إفراغ</button>
        </div>
    </div>

    <div id="homePage">
        <div class="main-grid">
            <div class="nav-card" onclick="showPage('shop')">
                <i class="fas fa-store"></i>
                <div>سوق مساعد المهندس</div>
            </div>
            <div class="nav-card" onclick="showPage('posts')">
                <i class="fas fa-microchip"></i>
                <div>الحلول الصناعية</div>
            </div>
            <div class="nav-card" onclick="showPage('posts')">
                <i class="fas fa-cogs"></i>
                <div>التحكم الآلي</div>
            </div>
            <div class="nav-card" onclick="showPage('posts')">
                <i class="fas fa-project-diagram"></i>
                <div>مشاريعنا</div>
            </div>
        </div>
    </div>

    <div id="shopPage" class="hidden">
        <div class="product-list">
            <div class="product-card">
                <img src="images/01 (1).jpg" class="product-img" alt="Product">
                <div class="product-info">
                    <h4>محرك سيرفو صناعي</h4>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('p1', -1)">-</button>
                        <span id="qty-p1">1</span>
                        <button class="qty-btn" onclick="updateQty('p1', 1)">+</button>
                    </div>
                    <button id="btn-p1" class="add-btn" onclick="toggleCart('p1', 'محرك سيرفو')">أضف للسلة</button>
                </div>
            </div>
        </div>
    </div>

    <div id="postsPage" class="hidden">
        <div class="post-card">
            <div class="post-header">
                <div class="post-avatar"></div>
                <div><b>المهندس ناصر</b><br><small>منذ ساعتين</small></div>
            </div>
            <div class="post-content">
                تم اليوم الانتهاء من لوحة التحكم الخاصة بمصنع "الهدى" باستخدام انفرتر SAVCH.
                <img src="images/01 (2).jpg" style="width:100%; margin-top:10px; border-radius:8px;">
            </div>
            <hr style="opacity: 0.1;">
            <div onclick="addComment()" style="cursor:pointer; color:var(--accent); font-size:14px;">
                <i class="far fa-comment"></i> إضافة تعليق سريع...
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="showPage('home')"><i class="fas fa-home"></i></div>
        <div onclick="showPage('shop')"><i class="fas fa-shopping-cart"></i></div>
        <div onclick="showPage('posts')"><i class="fas fa-rss"></i></div>
    </nav>

    <script>
        let cart = JSON.parse(localStorage.getItem('dh_cart')) || {};

        // تحديث الواجهة عند التحميل
        window.onload = () => {
            updateUI();
        };

        function showPage(pageId) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('shopPage').classList.add('hidden');
            document.getElementById('postsPage').classList.add('hidden');
            document.getElementById(pageId + 'Page').classList.remove('hidden');
        }

        function updateQty(id, change) {
            let qtyEl = document.getElementById('qty-' + id);
            let current = parseInt(qtyEl.innerText);
            if (current + change >= 1) {
                qtyEl.innerText = current + change;
                if (cart[id]) {
                    cart[id].qty = current + change;
                    saveCart();
                }
            }
        }

        function toggleCart(id, name) {
            let btn = document.getElementById('btn-' + id);
            let qty = parseInt(document.getElementById('qty-' + id).innerText);

            if (cart[id]) {
                delete cart[id];
                btn.classList.remove('added');
                btn.innerText = "أضف للسلة";
            } else {
                cart[id] = { name: name, qty: qty };
                btn.classList.add('added');
                btn.innerText = "إلغاء (مضاف)";
            }
            saveCart();
        }

        function saveCart() {
            localStorage.setItem('dh_cart', JSON.stringify(cart));
            updateUI();
        }

        function updateUI() {
            let count = Object.keys(cart).length;
            document.getElementById('cartCount').innerText = count;
            
            // تحديث حالة الأزرار لو المنتج موجود في السلة المحفوظة
            for (let id in cart) {
                let btn = document.getElementById('btn-' + id);
                if (btn) {
                    btn.classList.add('added');
                    btn.innerText = "إلغاء (مضاف)";
                    document.getElementById('qty-' + id).innerText = cart[id].qty;
                }
            }
        }

        function clearCart(e) {
            e.stopPropagation();
            if(confirm("هل تريد إفراغ السلة؟")) {
                cart = {};
                localStorage.removeItem('dh_cart');
                location.reload(); // لإعادة ضبط الأزرار
            }
        }

        function addComment() {
            let user = localStorage.getItem('user_name');
            if (!user) {
                user = prompt("أهلاً بك! اكتب اسمك ليظهر عند التعليق:");
                if (user) localStorage.setItem('user_name', user);
            }
            if (user) {
                alert("تم تسجيل تعليقك باسم: " + user);
            }
        }
    </script>
</body>
</html>
