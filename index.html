<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH Automation | مساعد المهندس</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00d2ff;
            --accent-color: #3a7bd5;
            --bg-dark: #0f0f0f;
            --card-bg: #1e1e26;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* شاشة الحظر */
        #blocked-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            text-align: center;
            padding-top: 20%;
        }

        .header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(145deg, #1e1e26, #0f0f0f);
            border-bottom: 3px solid var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--primary-color);
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin-top: 30px;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 20px;
            border-right: 4px solid var(--primary-color);
            padding-right: 10px;
            color: #aaa;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 1px solid #333;
        }

        .card:active {
            transform: scale(0.9);
            background: var(--primary-color);
        }

        .card i {
            font-size: 35px;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .card span {
            font-size: 14px;
            font-weight: 600;
        }

        .footer {
            margin: 50px 0 20px;
            font-size: 11px;
            color: #555;
            text-align: center;
        }

        /* تحسينات الموبايل */
        @media (max-width: 400px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="blocked-screen">
        <i class="fas fa-user-lock" style="font-size: 100px; color: red;"></i>
        <h1 style="color: white; margin-top: 20px;">الوصول غير مصرح به</h1>
        <p style="color: #888;">برجاء مراجعة المهندس مدبولي لتفعيل النسخة.</p>
    </div>

    <div id="app-content" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="header">
            <h1 class="logo-text">DH AUTOMATION</h1>
            <p style="font-size: 12px; color: #777; margin-top: 5px;">INDUSTRIAL SOLUTIONS & FIRMWARE</p>
        </div>

        <div class="container">
            <h2 class="section-title">القائمة الرئيسية</h2>
            <div class="grid">
                <a href="sunch_catalog.pdf" class="card">
                    <i class="fas fa-file-pdf"></i>
                    <span>كتالوجات Sunch</span>
                </a>
                
                <a href="#" class="card">
                    <i class="fas fa-code"></i>
                    <span>مشاريع PIC</span>
                </a>

                <a href="#" class="card">
                    <i class="fas fa-tools"></i>
                    <span>أدوات الصيانة</span>
                </a>

                <a href="https://wa.me/201060309904" class="card" style="border-color: #25d366;">
                    <i class="fab fa-whatsapp" style="color: #25d366;"></i>
                    <span>دعم المهندس مدبولي</span>
                </a>
            </div>
        </div>

        <div class="footer">
            <p>Designed for Eng. Madbouli &copy; 2026</p>
            <p>DH Automation V2.0</p>
        </div>
    </div>

    <script>
        // نظام الحماية (Blacklist)
        const banned = ["HACKER_ID", "USER_77"]; // حط هنا الـ IDs الممنوعة

        const urlParams = new URLSearchParams(window.location.search);
        const userDevice = urlParams.get('id');

        if (banned.includes(userDevice)) {
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('blocked-screen').style.display = 'block';
        }
    </script>
</body>
</html>
