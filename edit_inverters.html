        <html lang="ar" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>دليل DH - العميل</title>
            <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
            <style>
                *{box-sizing:border-box;}
                body{font-family:'Tajawal',sans-serif; background:#f4f7f9; padding:20px;}
                .container{max-width:1000px;margin:auto;background:white;border-radius:20px;padding:20px;box-shadow:0 0 20px rgba(0,0,0,0.1);}
                h1{color:#004a99;text-align:center;}
                .search-box{width:100%;padding:12px;margin:15px 0;border-radius:10px;border:1px solid #ccc;}
                .filters{display:flex;gap:10px;margin-bottom:20px;}
                .filters select{flex:1;padding:10px;border-radius:8px;}
                .card{background:#f8f9fa;border-right:5px solid #004a99;padding:15px;margin-bottom:15px;border-radius:10px;}
                .param{border-right-color:#28a745;}
                .error{border-right-color:#f39c12;}
                .badge{display:inline-block;padding:3px 8px;border-radius:15px;font-size:0.8rem;}
                .badge-param{background:#28a74520;color:#155724;}
                .badge-error{background:#f39c1220;color:#856404;}
            </style>
        </head>
        <body>
        <div class="container">
            <h1>📋 دليل DH التقني</h1>
            <input type="text" id="search" class="search-box" placeholder="بحث..." onkeyup="filterData()">

            <div id="results"></div>
        </div>

                errors: [{"type":"error","brand":"INVT","model":"GD200/GD20/GD10","eCode":"OC1/OC2/OC3","eName":"تيار زائد","eSolve":"زيادة زمن التسارع/التباطؤ، فحص الحمل","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"INVT","model":"GD200/GD20/GD10","eCode":"OV1/OV2/OV3","eName":"جهد زائد","eSolve":"زيادة زمن التباطؤ، إضافة مقاومة فرملة","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"INVT","model":"GD200/GD20/GD10","eCode":"OL1/OL2","eName":"حمل زائد","eSolve":"فحص قدرة المحرك/الإنفرتر، تقليل الحمل","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"INVT","model":"GD200/GD20/GD10","eCode":"OH1/OH2","eName":"حرارة زائدة","eSolve":"تنظيف المراوح، تحسين التهوية","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"LS Electric","model":"S100/C100","eCode":"OC/OV","eName":"تيار/جهد زائد","eSolve":"زيادة زمن التسارع/التباطؤ","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"LS Electric","model":"S100/C100","eCode":"OL","eName":"حمل زائد","eSolve":"فحص الحمل والمحرك","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"Mitsubishi","model":"D700","eCode":"E.OC1/E.OC2/E.OC3","eName":"تيار زائد","eSolve":"زيادة زمن التسارع/التباطؤ، فحص الحمل","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"Mitsubishi","model":"D700","eCode":"E.OV1/E.OV2/E.OV3","eName":"جهد زائد","eSolve":"زيادة زمن التباطؤ، إضافة مقاومة فرملة","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"Mitsubishi","model":"D700","eCode":"E.THM/E.THT","eName":"حمل زائد","eSolve":"فحص قدرة المحرك، تقليل الحمل","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"Schneider","model":"ATV12","eCode":"OCF/OCB","eName":"تيار زائد","eSolve":"زيادة زمن التسارع، فحص المحرك","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"Schneider","model":"ATV12","eCode":"OBF","eName":"جهد زائد","eSolve":"فحص جهد الدخل، زيادة زمن التباطؤ","date":"2026-01-01T00:00:00.000Z"},{"type":"error","brand":"Siemens","model":"V20","eCode":"F0001/F0002","eN             };
            const brands = [...new Set([...data.params.map(p=>p.brand), ...data.errors.map(e=>e.brand)])];
            function populateFilters(){
                let brandSelect = document.getElementById('brandFilter');
                brandSelect.innerHTML = '<option value="all">كل الماركات</option>' + brands.map(b=>'<option value="'+b+'">'+b+'</option>').join('');
                filterData();
            }
            function filterData(){
                let brand = document.getElementById('brandFilter').value;
                let model = document.getElementById('modelFilter').value;
                let search = document.getElementById('search').value.toLowerCase();
                let items = [...data.params, ...data.errors];
                if(brand !== 'all') items = items.filter(i=>i.brand === brand);
                if(model !== 'all') items = items.filter(i=>i.model === model);
                if(search) items = items.filter(i=>JSON.stringify(i).toLowerCase().includes(search));
                
                let models = [...new Set(items.map(i=>i.model))];
                let modelSelect = document.getElementById('modelFilter');
                modelSelect.innerHTML = '<option value="all">كل الموديلات</option>' + models.map(m=>'<option value="'+m+'">'+m+'</option>').join('');
                
                let container = document.getElementById('results');
                if(items.length===0){ container.innerHTML='<p style="text-align:center">لا توجد نتائج</p>'; return; }
                container.innerHTML = items.map(item=>{
                    if(item.type==='param'){
                        return '<div class="card param"><div><strong>'+item.req+'</strong> ('+item.code+' = '+item.val+')</div><div class="badge badge-param">بارامتر</div><small>'+item.brand+' | '+item.model+'</small></div>';
                    } else {
                        return '<div class="card error"><div><strong>'+item.eCode+' - '+item.eName+'</strong></div><div>🔧 '+item.eSolve+'</div><div class="badge badge-error">عطل</div><small>'+item.brand+' | '+item.model+'</small></div>';
                    }
                }).join('');
            }
            populateFilters();
        </script>
